databases:
  - name: resos-mysql
    databaseName: restos_db
    plan: free
    region: oregon

services:
  # ─────────────────────────────────────────────
  # BACKEND — Express + Prisma + Socket.io
  # ─────────────────────────────────────────────
  - type: web
    name: resos-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: resos-mysql
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: CORS_ORIGIN
        value: https://resos-frontend.onrender.com  # ← cambiá esto por la URL real del frontend

  # ─────────────────────────────────────────────
  # FRONTEND — React + Vite (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: resos-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://resos-backend.onrender.com  # ← cambiá esto por la URL real del backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html