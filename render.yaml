# ──────────────────────────────────────────────
# RestOS — Backend (Express + Prisma + Socket.io)
# ──────────────────────────────────────────────
# IMPORTANTE: Render no ofrece MySQL gestionado (solo Postgres).
# Necesitás una base de datos MySQL externa (ej. Aiven free tier).
# Configurá la variable DATABASE_URL manualmente en el dashboard de
# Render con la connection string de tu proveedor MySQL.
#
# El frontend se despliega por separado en Netlify (ver apps/frontend).

services:
  - type: web
    name: restos-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/backend
    buildCommand: cd ../.. && npm install --include=dev && cd apps/backend && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false   # ← configurar manualmente en el dashboard (connection string MySQL externa)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: CORS_ORIGIN
        value: https://restos-cliente.netlify.app  # ← cambiá esto por la URL real de tu sitio en Netlify